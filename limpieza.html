<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de Limpieza</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="simulation-container">
        <header>
            <a href="index.html" class="back-link">← Volver al Dashboard</a>
            <h1>Simulación de Limpieza</h1>
        </header>

        <main class="simulation-content">
            <canvas id="canvas"></canvas>
            
            <div class="controls">
                <button id="playPauseBtn" class="btn">Reproducir</button>
                <button id="resetBtn" class="btn">Reiniciar</button>
                <button id="gifBtn" class="btn">Capturar GIF</button>
            </div>

            <div class="info-panel">
                <h3>Información de la Simulación</h3>
                <p id="particles">Partículas: 0</p>
                <p id="efficiency">Eficiencia: 0%</p>
                <p id="time">Tiempo: 0s</p>
            </div>
        </main>

        <footer>
            <p>Dinámica de Partículas - Procesos de Limpieza</p>
        </footer>
    </div>

    <script src="js/limpieza.js"></script>
</body>
</html>
