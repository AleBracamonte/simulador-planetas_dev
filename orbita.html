<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de Órbita</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="simulation-container">
        <header>
            <a href="index.html" class="back-link">← Volver al Dashboard</a>
            <h1>Simulación de Órbita</h1>
        </header>

        <main class="simulation-content">
            <canvas id="canvas"></canvas>
            
            <div class="controls">
                <button id="playPauseBtn" class="btn">Reproducir</button>
                <button id="resetBtn" class="btn">Reiniciar</button>
                <button id="gifBtn" class="btn">Capturar GIF</button>
            </div>

            <div class="info-panel">
                <h3>Información de la Simulación</h3>
                <p id="velocity">Velocidad: 0 m/s</p>
                <p id="distance">Distancia: 0 km</p>
                <p id="acceleration">Aceleración: 0 m/s²</p>
            </div>
        </main>

        <footer>
            <p>Física de Órbitas - Principios Gravitacionales</p>
        </footer>
    </div>

    <script src="js/orbita.js"></script>
</body>
</html>
